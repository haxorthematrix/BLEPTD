; PlatformIO Configuration for BLEPTD
; BLE Privacy Threat Detector for CYD (Cheap Yellow Display)
;
; The 2.8" CYD ships in two hardware revisions that share the same ESP32 and
; pinout but use different TFT controllers:
;
;   - ESP32-2432S028R   (single micro-USB connector) -> ILI9341 driver
;   - ESP32-2432S028Rv3 (micro-USB + USB-C, or USB-C only) -> ST7789 driver
;
; Flashing ILI9341 firmware to an ST7789 board (and vice versa) produces a
; white screen because the controller ignores the init sequence it does not
; recognise. Pick the env that matches your board:
;
;   pio run -e cyd_microusb -t upload    # micro-USB only board (ILI9341)
;   pio run -e cyd_usbc     -t upload    # USB-C board (ST7789)
;
; `cyd` is kept as an alias for `cyd_microusb` so existing build commands
; continue to work.

; -----------------------------------------------------------------------------
; Shared base: everything that does NOT depend on the display controller.
; -----------------------------------------------------------------------------
[base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^6.21.0

board_build.partitions = default.csv

build_flags =
    ; TFT_eSPI shared pinout (identical on both CYD revisions)
    -DUSER_SETUP_LOADED=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DUSE_HSPI_PORT=1
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; Font loading
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; Debug level (0=none, 1=error, 2=warn, 3=info, 4=debug, 5=verbose)
    -DCORE_DEBUG_LEVEL=1
    ; Project version
    -DBLEPTD_VERSION=\"1.0.2\"

; -----------------------------------------------------------------------------
; Micro-USB CYD (ESP32-2432S028R) — ILI9341 controller
; -----------------------------------------------------------------------------
[env:cyd_microusb]
extends = base
build_flags =
    ${base.build_flags}
    -DBLEPTD_VARIANT_MICROUSB=1
    -DILI9341_2_DRIVER=1

; Backwards-compatible alias for the original `cyd` env.
[env:cyd]
extends = env:cyd_microusb

; -----------------------------------------------------------------------------
; USB-C CYD (ESP32-2432S028R v3) — ILI9342 controller
; The USB-C revision of the CYD uses an ILI9342 panel (not ILI9341 or ST7789
; as is often misreported). It needs RGB colour order and inverted output;
; without these the screen comes up white (driver mismatch) or with wrong
; colours.
; -----------------------------------------------------------------------------
[env:cyd_usbc]
extends = base
build_flags =
    ${base.build_flags}
    -DBLEPTD_VARIANT_USBC=1
    -DILI9342_DRIVER=1
    -DTFT_RGB_ORDER=1
    -DTFT_INVERSION_ON=1

; -----------------------------------------------------------------------------
; Debug builds (verbose logging) for both variants
; -----------------------------------------------------------------------------
[env:cyd_microusb_debug]
extends = env:cyd_microusb
build_flags =
    ${env:cyd_microusb.build_flags}
    -UCORE_DEBUG_LEVEL
    -DCORE_DEBUG_LEVEL=4
    -DDEBUG_MODE=1

[env:cyd_usbc_debug]
extends = env:cyd_usbc
build_flags =
    ${env:cyd_usbc.build_flags}
    -UCORE_DEBUG_LEVEL
    -DCORE_DEBUG_LEVEL=4
    -DDEBUG_MODE=1

; Backwards-compatible alias for the original debug env.
[env:cyd_debug]
extends = env:cyd_microusb_debug
